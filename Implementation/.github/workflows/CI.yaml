name: CI

on:
  push:
  pull_request:

jobs:

  # ── 1. Lint & type check ───────────────────────────────────────────────────
  lint:
    name: Lint & type check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install tools
        run: pip install ruff pyright

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Pyright type check
        run: pyright

  # ── 2. Unit tests ──────────────────────────────────────────────────────────
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest coverage

      - name: Run tests with coverage
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          RABBITMQ_URL: ${{ secrets.RABBITMQ_URL }}
          JOB_QUEUE_NAME: ${{ secrets.JOB_QUEUE_NAME }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_SECRET_TOKEN: ${{ secrets.TELEGRAM_SECRET_TOKEN }}
          TELEGRAM_SEND_MESSAGE_URL: ${{ secrets.TELEGRAM_SEND_MESSAGE_URL }}
          PREVIEW_BASE_URL: ${{ secrets.PREVIEW_BASE_URL }}
          PREVIEWS_PATH: ${{ secrets.PREVIEWS_PATH }}
          AI_PROVIDER: ${{ secrets.AI_PROVIDER }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
          AI_TIMEOUT: ${{ secrets.AI_TIMEOUT }}
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          DASHSCOPE_API_URL: ${{ secrets.DASHSCOPE_API_URL }}
          DASHVECTOR_API_KEY: ${{ secrets.DASHVECTOR_API_KEY }}
          DASHVECTOR_ENDPOINT: ${{ secrets.DASHVECTOR_ENDPOINT }}
          CHUNK_STORE_PATH: ${{ secrets.CHUNK_STORE_PATH }}
          MAX_RETRIES: ${{ secrets.MAX_RETRIES }}
          RETRY_BASE_DELAY: ${{ secrets.RETRY_BASE_DELAY }}
          RETRY_MAX_DELAY: ${{ secrets.RETRY_MAX_DELAY }}
          CORE_SAAS_TELEGRAM_URL: ${{ secrets.CORE_SAAS_TELEGRAM_URL }}
          CORE_LOGIN_TELEGRAM_URL: ${{ secrets.CORE_LOGIN_TELEGRAM_URL }}
          EXPOZY_ADMIN_LOGIN_URL: ${{ secrets.EXPOZY_ADMIN_LOGIN_URL }}
          EXPOZY_STORE_DOMAIN: ${{ secrets.EXPOZY_STORE_DOMAIN }}
          LOG_LEVEL: INFO
          LOG_FORMAT: json
        run: |
          coverage run -m pytest tests/ -v
          coverage report --fail-under=70

  # ── 3. Rebuild catalog if component_catalog or page_types changed ──────────
  catalog:
    name: Rebuild & vectorize catalog
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if catalog files changed
        id: catalog_check
        run: |
          git diff --name-only HEAD~1 HEAD > changed_files.txt
          cat changed_files.txt
          if grep -qE "api/orchestrator/schemas/(component_catalog|page_types)\.json" changed_files.txt; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - uses: actions/setup-python@v5
        if: steps.catalog_check.outputs.changed == 'true'
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        if: steps.catalog_check.outputs.changed == 'true'
        run: pip install -r requirements.txt

      - name: Run combine_catalog.py
        if: steps.catalog_check.outputs.changed == 'true'
        run: python api/orchestrator/vectorizer/combine_catalog.py

      - name: Run catalog_vectorizer.py
        if: steps.catalog_check.outputs.changed == 'true'
        env:
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          DASHSCOPE_API_URL: ${{ secrets.DASHSCOPE_API_URL }}
          DASHVECTOR_API_KEY: ${{ secrets.DASHVECTOR_API_KEY }}
          DASHVECTOR_ENDPOINT: ${{ secrets.DASHVECTOR_ENDPOINT }}
          CHUNK_STORE_PATH: ${{ secrets.CHUNK_STORE_PATH }}
        run: python api/orchestrator/vectorizer/catalog_vectorizer.py

      - name: Commit updated combined_catalog.json
        if: steps.catalog_check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add api/orchestrator/schemas/combined_catalog.json
          git diff --cached --quiet || git commit -m "chore: rebuild combined_catalog [skip ci]"
          git push