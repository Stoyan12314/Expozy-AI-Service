name: Deployment

on:
  pull_request:
    branches:
      - Deployment
    types:
      - closed

jobs:
  check-merged:
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    steps:
      - run: echo "PR merged into deployment — running pipeline"


  # ── 1. Lint & type check (blocking) ───────────────────────────────────────
  lint:
    name: Lint & type check
    runs-on: ubuntu-latest
    needs: check-merged

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install tools
        run: pip install ruff pyright

      - name: Ruff lint
        id: ruff_lint
        continue-on-error: true
        run: ruff check . --output-format=github

      - name: Ruff format check
        id: ruff_format
        continue-on-error: true
        run: ruff format --check .

      - name: Pyright type check
        id: pyright
        continue-on-error: true
        run: pyright

      - name: Summary report
        run: |
          echo "## Lint & Type Check (deployment — blocking)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.ruff_lint.outcome }}" == "success" ]; then
            echo "✅ Ruff lint — passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Ruff lint — failed" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ steps.ruff_format.outcome }}" == "success" ]; then
            echo "✅ Ruff format — passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Ruff format — failed (run \`ruff format .\` locally)" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ steps.pyright.outcome }}" == "success" ]; then
            echo "✅ Pyright — passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Pyright — failed" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Fail if any check failed
        if: |
          steps.ruff_lint.outcome == 'failure' ||
          steps.ruff_format.outcome == 'failure' ||
          steps.pyright.outcome == 'failure'
        run: |
          echo "Lint or type checks failed. Fix before deploying."
          exit 1

  # ── 2. Unit tests (blocking) ───────────────────────────────────────────────
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest coverage

      - name: Run tests
        id: pytest
        continue-on-error: true
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          RABBITMQ_URL: ${{ secrets.RABBITMQ_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_SECRET_TOKEN: ${{ secrets.TELEGRAM_SECRET_TOKEN }}
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          DASHVECTOR_API_KEY: ${{ secrets.DASHVECTOR_API_KEY }}
          CORE_SAAS_TELEGRAM_URL: ${{ secrets.CORE_SAAS_TELEGRAM_URL }}
          CORE_LOGIN_TELEGRAM_URL: ${{ secrets.CORE_LOGIN_TELEGRAM_URL }}
          AI_MODEL: ${{ vars.AI_MODEL }}
          AI_PROVIDER: ${{ vars.AI_PROVIDER }}
          AI_TIMEOUT: ${{ vars.AI_TIMEOUT }}
          CHUNK_STORE_PATH: ${{ vars.CHUNK_STORE_PATH }}
          DASHSCOPE_API_URL: ${{ vars.DASHSCOPE_API_URL }}
          DASHVECTOR_ENDPOINT: ${{ vars.DASHVECTOR_ENDPOINT }}
          EXPOZY_ADMIN_LOGIN_URL: ${{ vars.EXPOZY_ADMIN_LOGIN_URL }}
          EXPOZY_STORE_DOMAIN: ${{ vars.EXPOZY_STORE_DOMAIN }}
          JOB_QUEUE_NAME: ${{ vars.JOB_QUEUE_NAME }}
          LOG_FORMAT: ${{ vars.LOG_FORMAT }}
          LOG_LEVEL: ${{ vars.LOG_LEVEL }}
          MAX_RETRIES: ${{ vars.MAX_RETRIES }}
          PREVIEWS_PATH: ${{ vars.PREVIEWS_PATH }}
          PREVIEW_BASE_URL: ${{ vars.PREVIEW_BASE_URL }}
          RETRY_BASE_DELAY: ${{ vars.RETRY_BASE_DELAY }}
          RETRY_MAX_DELAY: ${{ vars.RETRY_MAX_DELAY }}
          TELEGRAM_SEND_MESSAGE_URL: ${{ vars.TELEGRAM_SEND_MESSAGE_URL }}
        run: |
          coverage run -m pytest tests/ -v
          coverage report --fail-under=70

      - name: Summary report
        run: |
          echo "## Unit Tests (deployment — blocking)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.pytest.outcome }}" == "success" ]; then
            echo "✅ Tests — passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Tests — failed" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Fail if tests failed
        if: steps.pytest.outcome == 'failure'
        run: |
          echo "Tests failed. Fix before deploying."
          exit 1

  # ── 3. Catalog rebuild (blocking) ─────────────────────────────────────────
  catalog:
    name: Rebuild & vectorize catalog
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if catalog files changed
        id: catalog_check
        run: |
          git diff --name-only HEAD~1 HEAD > changed_files.txt
          if grep -qE "api/orchestrator/schemas/(component_catalog|page_types)\.json" changed_files.txt; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - uses: actions/setup-python@v5
        if: steps.catalog_check.outputs.changed == 'true'
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        if: steps.catalog_check.outputs.changed == 'true'
        run: pip install -r requirements.txt

      - name: Run combine_catalog.py
        if: steps.catalog_check.outputs.changed == 'true'
        run: python api/orchestrator/vectorizer/combine_catalog.py

      - name: Run catalog_vectorizer.py
        if: steps.catalog_check.outputs.changed == 'true'
        env:
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          DASHVECTOR_API_KEY: ${{ secrets.DASHVECTOR_API_KEY }}
          DASHSCOPE_API_URL: ${{ vars.DASHSCOPE_API_URL }}
          DASHVECTOR_ENDPOINT: ${{ vars.DASHVECTOR_ENDPOINT }}
          CHUNK_STORE_PATH: ${{ vars.CHUNK_STORE_PATH }}
        run: |
          for attempt in 1 2 3; do
            echo "Attempt $attempt/3"
            python api/orchestrator/vectorizer/catalog_vectorizer.py && break
            if [ $attempt -lt 3 ]; then
              echo "Failed, retrying in 10s..."
              sleep 10
            else
              echo "All 3 attempts failed"
              exit 1
            fi
          done

      - name: Commit updated combined_catalog.json
        if: steps.catalog_check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add api/orchestrator/schemas/combined_catalog.json
          git diff --cached --quiet || git commit -m "chore: rebuild combined_catalog [skip ci]"
          git push
